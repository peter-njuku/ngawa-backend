services:
  web:
    build: .
    container_name: ngawasolutions-api
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && python manage.py init_admin && python manage.py seed_categories && gunicorn --bind 0.0.0.0:8000 --workers 4 ngawasolutions.wsgi:application"
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - ngawasolutions-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/categories/"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:15-alpine
    container_name: ngawasolutions-db
    environment:
      POSTGRES_DB: ${DB_NAME:-neondb}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - ngawasolutions-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  ngawasolutions-network:
    driver: bridge
